<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Birthday</title>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <!-- Css -->
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/decor.css" />
    <link rel="stylesheet" href="./css/cake-styles.css" />
    <link rel="stylesheet" href="./css/leter.css" />
  </head>
  <body>
    <audio
      id="audio"
      src="./audio/Khúc Hát Mừng Sinh Nhật [Remix] - Phan Đinh Tùng.mp3"
    ></audio>
    <main class="main">
      <div class="container">
        <div class="banner">
          <h1 class="title">Are you ready?</h1>
          <button class="btn play-btn" id="playBtn">
            <img src="./icon/play-solid.svg" alt="play" class="play-icon" />
          </button>
        </div>
        <div class="load-wrapper" hidden>
          <!-- <img class="load-icon" src="./img/image_no_bg.png" alt="load" /> -->
          <img class="load-icon" src="./img/jYGPfR01.svg" alt="load" />
          <img class="heart hear-1" src="./icon/heart-red.svg" alt="" />
          <img class="heart hear-2" src="./icon/heart-red.svg" alt="" />
          <img class="heart hear-3" src="./icon/heart-red.svg" alt="" />
          <img class="heart hear-4" src="./icon/heart-red.svg" alt="" />
          <img class="heart hear-5" src="./icon/heart-red.svg" alt="" />
          <img class="heart hear-6" src="./icon/heart-red.svg" alt="" />
        </div>
        <div class="question" hidden>
          <p class="task">Hôm nay là ngày?</p>
          <input type="date" name="" class="date" value="2001-10-09" />
          <button class="check btn">Check</button>
        </div>
        <div class="firework"></div>
        <div class="cake" hidden>
          <div class="cream"></div>
          <div class="cake__decor decor-1"></div>
          <div class="cake__decor decor-2"></div>
          <div class="cake__decor decor-3"></div>
          <div class="cake__decor decor-4"></div>
          <div class="cake__decor decor-5"></div>
          <div class="cake__decor decor-6"></div>
          <div class="cake__decor decor-circle-1"></div>
          <div class="cake__decor decor-circle-2"></div>
          <div class="cake__decor decor-circle-3"></div>
          <div class="cake__decor decor-circle-4"></div>
          <div class="cake__decor decor-circle-5"></div>
          <div class="cake__decor decor-circle-6"></div>
          <div class="seed-decor seed-decor-1"></div>
          <div class="seed-decor seed-decor-2"></div>
          <div class="seed-decor seed-decor-3"></div>
          <div class="seed-decor seed-decor-4"></div>
          <div class="seed-decor seed-decor-5"></div>
          <div class="seed-decor seed-decor-6"></div>
          <div class="seed-decor seed-decor-7"></div>
          <div class="seed-decor seed-decor-8"></div>
          <div class="seed-decor seed-decor-9"></div>
          <div class="seed-decor seed-decor-10"></div>
          <div class="seed-decor seed-decor-11"></div>
          <div class="seed-decor seed-decor-12"></div>
          <div class="candle candle-1">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-2">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-3">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-4">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-5">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-6">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-7">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-8">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-9">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
        </div>

        <canvas id="canvas"></canvas>
        <div class="scene"></div>
      </div>
    </main>
    <!-- sweetalert2 -->

    <!-- <script src="./main.js"></script> -->
    <script type="module" src="./src/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
