<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday</title>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <!-- Css -->
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/decor.css" />
  </head>
  <body>
    <div class="action">
      <button class="show-btn button">show</button>
      <button class="hidden-btn button">hidden</button>
    </div>
    <main class="main" hidden>
      <div class="container">
        <div class="cake">
          <div class="cream"></div>
          <div class="cake__decor decor-1"></div>
          <div class="cake__decor decor-2"></div>
          <div class="cake__decor decor-3"></div>
          <div class="cake__decor decor-4"></div>
          <div class="cake__decor decor-5"></div>
          <div class="cake__decor decor-6"></div>
          <div class="cake__decor decor-circle-1"></div>
          <div class="cake__decor decor-circle-2"></div>
          <div class="cake__decor decor-circle-3"></div>
          <div class="cake__decor decor-circle-4"></div>
          <div class="cake__decor decor-circle-5"></div>
          <div class="cake__decor decor-circle-6"></div>
          <div class="seed-decor seed-decor-1"></div>
          <div class="seed-decor seed-decor-2"></div>
          <div class="seed-decor seed-decor-3"></div>
          <div class="seed-decor seed-decor-4"></div>
          <div class="seed-decor seed-decor-5"></div>
          <div class="seed-decor seed-decor-6"></div>
          <div class="seed-decor seed-decor-7"></div>
          <div class="seed-decor seed-decor-8"></div>
          <div class="seed-decor seed-decor-9"></div>
          <div class="seed-decor seed-decor-10"></div>
          <div class="seed-decor seed-decor-11"></div>
          <div class="seed-decor seed-decor-12"></div>
          <div class="candle candle-1">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-2">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-3">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-4">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-5">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-6">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-7">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-8">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
          <div class="candle candle-9">
            <div class="wick">
              <div class="flame"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
