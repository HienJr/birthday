<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chữ rơi 3D - Nổ tung</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(#111, #000);
      }
      .scene {
        width: 100vw;
        height: 100vh;
        perspective: 1000px;
        perspective-origin: center;
        overflow: hidden;
      }
      .camera {
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        position: relative;
      }
      .text {
        position: absolute;
        color: white;
        font-size: 24px;
        font-weight: bold;
        white-space: nowrap;
        transform-style: preserve-3d;
        text-shadow: 1px 1px 2px #000;
        pointer-events: none;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="camera" id="camera"></div>
    </div>

    <script>
      const data = [
        "Xin Chào",
        "LOVE YOU",
        "Tuyệt vời",
        "❤️",
        "Vui vẻ",
        "Hạnh phúc",
      ];

      const camera = document.getElementById("camera");
      const sceneWidth = window.innerWidth;
      const sceneHeight = window.innerHeight;
      const layerCount = 4;
      const layerSpacing = 300;
      const padding = 20;
      const usedPositionsByLayer = Array.from({ length: layerCount }, () => []);

      function getTextWidth(textContent) {
        const temp = document.createElement("div");
        temp.style.position = "absolute";
        temp.style.visibility = "hidden";
        temp.style.fontSize = "24px";
        temp.style.fontWeight = "bold";
        temp.style.whiteSpace = "nowrap";
        temp.textContent = textContent;
        document.body.appendChild(temp);
        const width = temp.offsetWidth;
        document.body.removeChild(temp);
        return width;
      }

      function getRandomXPosition(layer, textWidth) {
        const used = usedPositionsByLayer[layer];
        let attempts = 0;
        while (attempts < 50) {
          const x = Math.random() * (sceneWidth - textWidth);
          const overlap = used.some(
            (pos) => Math.abs(pos.x - x) < (pos.width + textWidth) / 2 + padding
          );
          if (!overlap) {
            used.push({ x, width: textWidth });
            return x;
          }
          attempts++;
        }
        return null;
      }

      function explodeText(textEl, x, y, z) {
        const textContent = textEl.textContent;
        for (let i = 0; i < textContent.length; i++) {
          const span = document.createElement("span");
          span.textContent = textContent[i];
          span.className = "text";
          camera.appendChild(span);

          let dx = (Math.random() - 0.5) * 100;
          let dy = (Math.random() - 0.5) * 100 - 50;
          let dz = (Math.random() - 0.5) * 200;
          let opacity = 1;

          function animateFragment() {
            dx *= 0.98;
            dy += 1; // gravity
            dz *= 0.98;
            x += dx * 0.1;
            y += dy * 0.1;
            z += dz * 0.1;
            opacity -= 0.02;

            span.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            span.style.opacity = opacity.toFixed(2);

            if (opacity > 0) {
              requestAnimationFrame(animateFragment);
            } else {
              span.remove();
            }
          }

          animateFragment();
        }
      }

      function createFallingText() {
        const content = data[Math.floor(Math.random() * data.length)];
        const text = document.createElement("div");
        text.className = "text";
        text.textContent = content;
        camera.appendChild(text);

        const textWidth = getTextWidth(content);
        const layer = Math.floor(Math.random() * layerCount);
        const z = -layer * layerSpacing;
        const x = getRandomXPosition(layer, textWidth);
        if (x === null) {
          text.remove();
          return;
        }

        let y = -30;
        let velocity = 2 + layer * 0.5;

        function animate() {
          y += velocity;

          const depthFade = 1 - layer / layerCount;
          const bottomFade = 1 - Math.max(0, (y - sceneHeight + 100) / 100);
          const opacity = Math.max(0, Math.min(1, depthFade * bottomFade));

          text.style.opacity = opacity.toFixed(2);
          text.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;

          if (y >= sceneHeight - 40) {
            explodeText(text, x, y, z);
            text.remove();
            return;
          }

          requestAnimationFrame(animate);
        }

        animate();
      }

      setInterval(createFallingText, 400);

      // Xoay camera bằng chuột
      let angleX = -10,
        angleY = 0;
      let isMouseDown = false;
      let lastMouseX = 0,
        lastMouseY = 0;

      document.addEventListener("mousedown", (e) => {
        isMouseDown = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      });

      document.addEventListener("mouseup", () => {
        isMouseDown = false;
      });

      document.addEventListener("mousemove", (e) => {
        if (!isMouseDown) return;
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;

        angleY += dx * 0.3;
        angleX += dy * 0.3;
        angleX = Math.max(-90, Math.min(90, angleX));

        updateCameraRotation();
      });

      function updateCameraRotation() {
        camera.style.transform = `rotateX(${angleX}deg) rotateY(${angleY}deg)`;
      }

      updateCameraRotation();
    </script>
  </body>
</html>
